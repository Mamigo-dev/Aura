name = "aura-api"
main = "src/index.ts"
compatibility_date = "2024-12-01"

[vars]
ENVIRONMENT = "production"

# KV Namespace for caching
# [[kv_namespaces]]
# binding = "CACHE"
# id = "your-kv-namespace-id"

# Secrets (set via `wrangler secret put`):
# ANTHROPIC_API_KEY
# OPENAI_API_KEY
# BRAVE_SEARCH_API_KEY
# NEWSAPI_API_KEY
# PERPLEXITY_API_KEY
# GOOGLE_SEARCH_API_KEY
# GOOGLE_SEARCH_CX
